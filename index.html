<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart WMS - Inventory Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 1); }
        .scan-input { font-size: 28px !important; text-align: center; transition: all 0.3s ease; }
        .step-inactive { opacity: 0.4; filter: grayscale(1); transform: scale(0.95); }
        .step-active { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2); transform: scale(1.05); }
        .step-done { border-color: #10b981; background-color: #f0fdf4; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ef4444 !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- TOP NAVIGATION -->
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 17v-10l8 4" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-900 leading-tight">Smart WMS</h1>
                <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">Enterprise Inventory System</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right mr-2">
                <p id="displayMachine" class="text-xs font-bold text-indigo-600">Máy: Unknown</p>
                <button onclick="openSettings()" class="text-[10px] text-slate-400 hover:text-indigo-600 underline">Cài đặt máy</button>
            </div>
            <div class="w-8 h-8 bg-slate-200 rounded-full overflow-hidden border-2 border-white shadow-sm">
                <img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" alt="user">
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        
        <!-- SETTINGS MODAL (Hidden by default) -->
        <div id="settingsModal" class="hidden fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                <h3 class="text-lg font-bold mb-4 text-slate-800">Cài đặt thiết bị</h3>
                <label class="text-xs font-bold text-slate-500 uppercase block mb-2">Tên máy quét (ID):</label>
                <input type="text" id="machineName" class="w-full p-3 border rounded-xl mb-6 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Ví dụ: Máy 1">
                <div class="flex gap-3">
                    <button onclick="closeSettings()" class="flex-1 py-3 text-slate-600 font-semibold hover:bg-slate-100 rounded-xl transition">Hủy</button>
                    <button onclick="saveMachineName()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition">Lưu lại</button>
                </div>
            </div>
        </div>

        <!-- MAIN WORKFLOW CARD -->
        <div class="glass-card rounded-3xl shadow-xl overflow-hidden transition-all">
            <!-- Stepper Progress -->
            <div class="grid grid-cols-4 gap-1 p-4 bg-slate-50 border-b border-slate-100">
                <div id="s_loc" class="flex flex-col items-center py-2 rounded-xl border-2 transition-all duration-300">
                    <span class="text-[10px] font-bold uppercase text-slate-400">Vị trí</span>
                    <div class="w-5 h-5 rounded-full bg-slate-200 mt-1 flex items-center justify-center text-[10px] text-slate-500 font-bold">1</div>
                </div>
                <div id="s_tag" class="flex flex-col items-center py-2 rounded-xl border-2 transition-all duration-300">
                    <span class="text-[10px] font-bold uppercase text-slate-400">Tag ID</span>
                    <div class="w-5 h-5 rounded-full bg-slate-200 mt-1 flex items-center justify-center text-[10px] text-slate-500 font-bold">2</div>
                </div>
                <div id="s_item" class="flex flex-//col items-center py-2 rounded-xl border-2 transition-all duration-300">
                    <span class="text-[10px] font-bold uppercase text-slate-400">Mã Hàng</span>
                    <div class="w-5 h-5 rounded-full bg-slate-200 mt-1 flex items-center justify-center text-[10px] text-slate-500 font-bold">3</div>
                </div>
                <div id="s_qty" class="flex flex-col items-center py-2 rounded-xl border-2 transition-all duration-300">
                    <span class="text-[10px] font-bold uppercase text-slate-400">Số Lượng</span>
                    <div class="w-5 h-5 rounded-full bg-slate-200 mt-1 flex items-center justify-center text-[10px] text-slate-500 font-bold">4</div>
                </div>
            </div>

            <!-- Input Section -->
            <div class="p-8 text-center space-y-6">
                <div>
                    <h2 id="stepTitle" class="text-xl font-bold text-slate-800 mb-1">Đang chờ quét vị trí</h2>
                    <p id="stepDesc" class="text-sm text-slate-500">Vui lòng quét mã vị trí kệ/bin để bắt đầu</p>
                </div>

                <div class="relative max-w-sm mx-auto">
                    <input type="text" id="barcodeInput" 
                           class="scan-input w-full p-5 border-2 border-indigo-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all shadow-inner" 
                           placeholder="Scan here..." autofocus>
                </div>

                <div class="flex justify-center gap-4">
                    <button id="btnExport" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 active:scale-95 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.743a1 1 0 011.414 0L//9 10.586 10.707  kind la l" /></svg>
                        Đồng bộ Cloud
                    </button>
                    <button onclick="clearAll()" class="bg-white text-slate-400 p-3 rounded-2xl border border-slate-200 hover:text-red-500 transition-all active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0, 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.//8 4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 17v-10l8 4" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="mt-8 space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider">Lịch sử quét hiện tại</h3>
                <span id="count" class="bg-indigo-100 text-indigo-700 text-[10px] px-2 py-1 rounded-full font-bold">0 dòng</span>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-50 text-slate-500 uppercase font-semibold">
                        <tr>
                            <th class="px-4 py-3">Tag ID</th>
                            <th class="px-4 py-3">Mã Hàng</th>
                            <th class="px-4 py-3 text-center">SL</th>
                            <th class="px-4 py-3 text-right">Vị Trí</th>
                        </tr>
                    </thead>
                    <tbody id="dataList" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // CONFIG
        const CLOUD_URL = 'https://script.google.com/macros/s/XXXXX_LINK_CỦA_ANH_XXXXX/exec';
        
        const barcodeInput = document.getElementById('barcodeInput');
        const dataList = document.getElementById('dataList');
        const countDisp = document.getElementById('count');
        const displayMachine = document.getElementById('displayMachine');
        
        const steps = {
            LOC: { el: document.getElementById('s_loc'), title: 'Đang chờ quét vị trí', desc: 'Vui lòng quét mã vị trí kệ/bin' },
            TAG: { el: document.getElementById('s_tag'), title: 'Đang chờ quét Tag ID', desc: 'Quét mã Tag gắn trên sản phẩm' },
            ITEM: { el: document.getElementById('s_item'), title: 'Đang chờ quét Mã Hàng', desc: 'Quét mã SKU của sản phẩm' },
            QTY: { el: document.getElementById('s_qty'), title: 'Đang chờ nhập Số lượng', desc: 'Nhập số lượng và nhấn Enter' }
        };

        let currentStep = 'LOC';
        let currentLoc = localStorage.getItem('pda_loc_pro') || '';
        let scannedData = JSON.parse(localStorage.getItem('pda_data_pro')) || [];
        let tempRow = { tag: '', item: '', qty: '' };

        window.onload = () => {
            const mName = localStorage.getItem('pda_machine_name') || 'Unknown';
            document.getElementById('machineName').value = mName;
            documentP_name(mName);
            updateUI();
        };

        function documentP_name(name) {
            // Cập nhật hiển thị tên máy ở Header
            const header = document.querySelector('.text-right p');
            if(header) header.innerText = `Máy: ${name}`;
            else {
                // Nếu không tìm thấy element cụ thể, ta tạo/cập nhật qua ID
                const disp = document.getElementById('displayMachine');
                if(disp) disp.innerText = `Máy: ${name}`;
            }
        }

        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

        function saveMachineName() {
            const name = document.getElementById('machineName').value.trim();
            if (name) {
                localStorage.setItem('pda_machine_name', name);
                documentP_name(name);
                closeSettings();
            }
        }

        function updateUI() {
            // Update Stepper
            Object.keys(steps).forEach(step => {
                const s = steps[step];
                s.el.className = 'flex-1 py-2 rounded-lg text-center text-xs font-bold border-2 transition-all duration-300';
                if (currentStep === step) {
                    s.el.classList.add('step-active');
                    document.getElementById('stepTitle').innerText = s.title;
                    document.getElementById('stepDesc').innerText = s.desc;
                } else if (
                    (currentStep === 'TAG' && step === 'LOC') ||
                    (currentStep === 'ITEM' && (step === 'LOC' || step === 'TAG')) ||
                    (currentStep === 'QTY' && (step === 'LOC' || step === 'TAG' || step === 'ITEM'))
                ) {
                    s.el.classList.add('step-done');
                }
            });

            // Update Table
            dataList.innerHTML = '';
            scannedData.slice().reverse().forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `<td class="px-4 py-3 font-medium">${row.tag}</td><td class="px-4 py-3">${row.item}</td><td class="px-4 py-3 text-center">${row.qty}</td><td class="px-4 py-3 text-right text-slate-500">${row.loc}</td>`;
                dataList.appendChild(tr);
            });
            countDisp.innerText = `${scannedData.length} dòng`;
            localStorage.setItem('pda_data_pro', JSON.stringify(scannedData));
        }

        barcodeInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = barcodeInput.value.trim();
                if (!val) return;

                if (currentStep === 'LOC' || !currentLoc) {
                    currentLoc = val;
                    currentStep = 'TAG';
                } else if (currentStep === 'TAG') {
                    tempRow.tag = val;
                    currentStep = 'ITEM';
                } else if (currentStep === 'ITEM') {
                    tempRow.item = val;
                    currentStep = 'QTY';
                } else if (currentStep === 'QTY') {
                    tempRow.qty = val;
                    scannedData.push({
                        tag: tempRow.tag,
                        item: tempRow.item,
                        qty: tempRow.qty,
                        loc: currentLoc,
                        machine: localStorage.getItem('pda_machine_name') || 'Unknown'
                    });
                    tempRow = { tag: '', item: '', qty: '' };
                    currentStep = 'TAG';
                }
                updateUI();
                barcodeInput.value = ''; 
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('input') && !e.target.closest('button')) {
                barcodeInput.focus();
            }
        });

        document.getElementById('btnExport').addEventListener('click', async () => {
            if (scannedData.length === 0) {
                alert('Chưa có dữ liệu!');
                return;
            }
            const btn = document.getElementById('btnExport');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⌛ Đang đồng bộ...';
            btn.disabled = true;

            try {
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(scannedData)
                });
                alert('✅ ĐỒNG BỘ THÀNH CÔNG!');
                if (confirm('Xóa dữ liệu trên PDA?')) {
                    scannedData = [];
                    updateUI();
                }
            } catch (error) {
                alert('❌ LỖI: ' + error);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        function clearAll() {
            if (confirm('Xóa toàn bộ dữ liệu?')) {
                scannedData = [];
                currentLoc = '';
                currentStep = 'LOC';
                tempRow = { tag: '', item: '', qty: '' };
                updateUI();
            }
        }
        document.getElementById('btnClear').addEventListener('click', clearP); // Sửa lỗi gọi hàm clearAll
    </script>
</body>
</html>
